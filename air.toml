# WebVMM Air Configuration
# Live-reload for Go development

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/webvmm cmd/webvmm/main.go"
  bin = "./tmp/webvmm"
  args_bin = ["-dev", "-config", "./test/config.yaml"]
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "web/node_modules", "web/dist"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "yaml", "yml"]
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
